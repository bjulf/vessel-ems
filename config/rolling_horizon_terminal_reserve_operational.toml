# Preserved terminal-reserve rolling-horizon case for reserve-target tuning.
#
# This is no longer the default rolling-horizon benchmark. Use
# config/rolling_horizon_operational.toml for the soft-SOC
# rolling baseline.

[run]
label = "rolling_horizon_terminal_reserve_operational"
description = "Operational 15-minute average-load rolling-horizon MILP case with H=24, first-step implementation, and one-sided soft terminal reserve target"
show_solver_log = false
entry_point = "main_rolling_horizon.jl"
benchmark_entry_point = "main_baseline.jl"

[scheduling]
dt_minutes = 15

[load_profile]
path = "data/operational_profiles/operational_load_profile_15min_avg.csv"

[battery]
E_max = 940.0
SOC_min = 0.20
SOC_max = 0.80
P_ch_max = 753.0
P_dis_max = 943.0
eta_ch = 0.95
eta_dis = 0.95

[initial_conditions]
generator_commitment = [0, 0]
battery_energy_kwh = 564.0

[terminal_conditions]
battery_energy_min_kwh = 470.0

[rolling_horizon]
horizon_steps = 24
forecast_method = "persistence"
moving_average_window_steps = 4
soc_strategy = "terminal_reserve"
terminal_soc_target = 0.50
terminal_slack_penalty_g_per_kwh = 10000.0
tail_forecast_policy = "repeat_final_load"

[solver]
rolling_local_time_limit_sec = 30.0
progress_log_enabled = true
progress_log_every_steps = 10
slow_solve_log_threshold_sec = 5.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1000.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1000.0
