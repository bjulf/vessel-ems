# Current full-horizon benchmark baseline.
# This baseline has no enforced terminal SOC constraint. Terminal-SOC cases are
# named explicitly as terminal-SOC variants.

[run]
label = "baseline_model"
description = "Current full-horizon benchmark baseline with 70 percent initial battery SOC, no terminal SOC constraint, 20-80 percent battery SOC window, and 1000 g/start generator startup cost"
show_solver_log = true
entry_point = "main_baseline.jl"
output_root = "analysis/output/sensitivity_baseline"

[scheduling]
dt_minutes = 15

[load_profile]
# Synthetic 24-hour / 15-minute validation profile used in the report baseline.
path = "data/synthetic_profiles/validation_profile.csv"

[battery]
E_max = 940.0
SOC_min = 0.20
SOC_max = 0.80
P_ch_max = 753.0
P_dis_max = 943.0
eta_ch = 0.95
eta_dis = 0.95

[initial_conditions]
generator_commitment = [0, 0]
battery_energy_kwh = 658.0

[terminal_conditions]
battery_energy_min_kwh = 470.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1000.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1000.0
