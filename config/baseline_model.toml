# Frozen thesis baseline model parameters.
# The numerical values here should track the report-side baseline documents.

[run]
label = "baseline_model"
description = "Frozen thesis baseline configuration"
show_solver_log = true

[scheduling]
dt_minutes = 15

[load_profile]
# Synthetic 24-hour / 15-minute validation profile used in the report baseline.
path = "data/synthetic_profiles/validation_profile.csv"

[battery]
E_max = 940.0
SOC_min = 0.30
SOC_max = 0.90
P_ch_max = 753.0
P_dis_max = 943.0
eta_ch = 0.95
eta_dis = 0.95

[initial_conditions]
generator_commitment = [0, 0]
battery_energy_kwh = 470.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 350.0

[[generators]]
P_max = 385.0
