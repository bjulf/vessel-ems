# Baseline synthetic validation case with no enforced terminal SOC constraint.
# The 20-80 percent operating SOC window is softened with explicit slack penalties.

[run]
label = "baseline_model_no_terminal_soft_soc"
description = "Baseline synthetic validation case with no terminal SOC constraint and soft 20-80 percent SOC window penalties"
show_solver_log = true

[scheduling]
dt_minutes = 15

[load_profile]
path = "data/synthetic_profiles/validation_profile.csv"

[battery]
E_max = 940.0
SOC_min = 0.20
SOC_max = 0.80
P_ch_max = 753.0
P_dis_max = 943.0
eta_ch = 0.95
eta_dis = 0.95

[initial_conditions]
generator_commitment = [0, 0]
battery_energy_kwh = 658.0

[terminal_conditions]
battery_energy_min_kwh = 470.0

[soft_soc]
soc_min_penalty_g_per_kwh = 10000.0
soc_max_penalty_g_per_kwh = 10000.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 700.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 700.0
