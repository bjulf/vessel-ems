# Operational telemetry case derived from the preserved 1-minute comparison profile.
# Variant: 70 percent initial battery SOC, 50 percent terminal minimum SOC,
# 20 percent battery minimum SOC bound, 80 percent battery maximum SOC bound,
# and 700 g/start generator startup cost.

[run]
label = "operational_model_soc70_terminal50_socmin20_socmax80_cstart700g"
description = "Operational 15-minute averaged telemetry profile with 70 percent initial battery SOC, 50 percent terminal minimum SOC, 20-80 percent battery SOC window, and 700 g/start generator startup cost"
show_solver_log = true

[scheduling]
dt_minutes = 15

[load_profile]
path = "data/operational_profiles/operational_load_profile_15min_avg.csv"

[battery]
E_max = 940.0
SOC_min = 0.20
SOC_max = 0.80
P_ch_max = 753.0
P_dis_max = 943.0
eta_ch = 0.95
eta_dis = 0.95

[initial_conditions]
generator_commitment = [0, 0]
battery_energy_kwh = 658.0

[terminal_conditions]
battery_energy_min_kwh = 470.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 700.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 700.0
