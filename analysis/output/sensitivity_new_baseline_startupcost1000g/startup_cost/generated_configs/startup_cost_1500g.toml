[run]
label = "baseline_model_no_terminal_soc_cstart_1000g_cstart_1500g"
description = "Frozen thesis no-terminal benchmark configuration with 70 percent initial battery SOC, no terminal SOC constraint, 20-80 percent battery SOC window, and 1000 g/start generator startup cost | startup-cost sensitivity case: 1500 g/start"
show_solver_log = false
entry_point = "main_baseline_no_terminal_soc.jl"
output_root = "analysis/output/sensitivity_new_baseline_startupcost1000g"

[scheduling]
dt_minutes = 15

[load_profile]
path = "data/synthetic_profiles/validation_profile.csv"

[battery]
E_max = 940.0
SOC_min = 0.2
SOC_max = 0.8
P_ch_max = 753.0
P_dis_max = 943.0
eta_ch = 0.95
eta_dis = 0.95

[initial_conditions]
generator_commitment = [0, 0]
battery_energy_kwh = 658.0

[terminal_conditions]
battery_energy_min_kwh = 470.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1500.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1500.0
