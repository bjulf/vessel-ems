# MVP rolling-horizon controller with a soft preferred SOC operating band.
# This variant removes the local terminal SOC reserve constraint and penalizes
# violations of a preferred 20-80 percent SOC band over each local horizon. The
# physical battery energy bounds are 0-100 percent in the rolling local MILP.

[run]
label = "rolling_horizon_soft_soc20_operational_cstart_1000g_ma4"
description = "Operational 15-minute average-load rolling-horizon MILP benchmark with H=24, no terminal reserve constraint, and soft 20-80 percent preferred SOC band | moving-average load forecast, 4-step trailing window"
show_solver_log = false
entry_point = "main_rolling_horizon_soft_soc.jl"
benchmark_entry_point = "main_baseline_no_terminal_soc.jl"

[scheduling]
dt_minutes = 15

[load_profile]
path = "data/operational_profiles/operational_load_profile_15min_avg.csv"

[battery]
E_max = 940.0
SOC_min = 0.20
SOC_max = 0.80
P_ch_max = 753.0
P_dis_max = 943.0
eta_ch = 0.95
eta_dis = 0.95

[initial_conditions]
generator_commitment = [0, 0]
battery_energy_kwh = 564.0

[terminal_conditions]
battery_energy_min_kwh = 470.0

[rolling_horizon]
horizon_steps = 24
forecast_method = "moving_average"
moving_average_window_steps = 4
tail_forecast_policy = "repeat_final_load"

[soft_soc]
preferred_soc_min = 0.20
preferred_soc_max = 0.80
soc_min_penalty_g_per_kwh = 1000.0
soc_max_penalty_g_per_kwh = 1000.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1000.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1000.0

