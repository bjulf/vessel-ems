[run]
label = "rolling_horizon_operational_cstart_1000g_term_50pct_cterm_600"
description = "Operational 15-minute average-load rolling-horizon MILP benchmark with H=24, first-step implementation, and one-sided soft terminal reserve target | rolling reserve sensitivity: terminal SOC target 50%, C_term 600 g/kWh"
show_solver_log = false
entry_point = "main_rolling_horizon.jl"
benchmark_entry_point = "main_baseline_no_terminal_soc.jl"

[scheduling]
dt_minutes = 15

[load_profile]
path = "data/operational_profiles/operational_load_profile_15min_avg.csv"

[battery]
E_max = 940.0
SOC_min = 0.2
SOC_max = 0.8
P_ch_max = 753.0
P_dis_max = 943.0
eta_ch = 0.95
eta_dis = 0.95

[initial_conditions]
generator_commitment = [0, 0]
battery_energy_kwh = 564.0

[terminal_conditions]
battery_energy_min_kwh = 470.0

[rolling_horizon]
horizon_steps = 24
terminal_soc_target = 0.5
terminal_slack_penalty_g_per_kwh = 600.0
tail_forecast_policy = "repeat_final_load"

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1000.0

