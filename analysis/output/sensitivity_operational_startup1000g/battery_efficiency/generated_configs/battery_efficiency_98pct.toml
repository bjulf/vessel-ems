[run]
label = "operational_model_soc60_no_terminal_cstart_1000g_sensitivity_eta_98pct"
description = "Operational 3-day 15-minute averaged telemetry profile with 60 percent initial battery SOC, no enforced terminal SOC constraint, hard 20-80 percent battery SOC window, and 1000 g/start generator startup cost | battery-efficiency sensitivity case: 98 percent"
show_solver_log = false
entry_point = "main_baseline.jl"
output_root = "analysis/output/sensitivity_operational_startup1000g"

[scheduling]
dt_minutes = 15

[load_profile]
path = "data/operational_profiles/operational_load_profile_15min_avg.csv"

[battery]
E_max = 940.0
SOC_min = 0.2
SOC_max = 0.8
P_ch_max = 753.0
P_dis_max = 943.0
eta_ch = 0.98
eta_dis = 0.98

[initial_conditions]
generator_commitment = [0, 0]
battery_energy_kwh = 564.0

[terminal_conditions]
battery_energy_min_kwh = 470.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1000.0
shutdown_cost = 0.0

[[generators]]
P_max = 385.0
P_min = 192.0
P = [192.0, 288.0, 310.0, 385.0]
SFOC = [193.0, 191.0, 191.0, 198.0]
startup_cost = 1000.0
shutdown_cost = 0.0
